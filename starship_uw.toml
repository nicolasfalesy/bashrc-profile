# ╔══════════════════════════════════════════════════════════════════════╗
# ║  Starship Prompt — "Waterloo Gold" theme                            ║
# ║  Two-line powerline with right-aligned info bar                     ║
# ║  Rounded pill-shaped outer caps (U+E0B6 left, U+E0B4 right)        ║
# ║  Palette: warm blacks, UW gold tones, amber                         ║
# ╚══════════════════════════════════════════════════════════════════════╝
#
# Color reference (UWaterloo themed):
#   #1a1400  bg_deep    — deep warm black
#   #FFC726  gold       — UW gold (directory)
#   #C9920A  gold_mid   — darker gold (git)
#   #9B6E00  gold_dark  — deep gold (language)
#   #7A5500  amber      — dark amber (duration)
#   #FFD700  fg_gold    — bright gold text on dark bg
#   #F5ECC8  fg_warm    — warm white text on dark bg
#   #FFE566  fg_bright  — light yellow accent
#   #f7768e  red        — errors / deletions
#   #9ece6a  green_ok   — success / additions

format = """
[](fg:#1a1400)\
$os\
$username\
$hostname\
[](bg:#FFC726 fg:#1a1400)\
$directory\
[](bg:#C9920A fg:#FFC726)\
$git_branch\
$git_status\
$git_metrics\
[](bg:#9B6E00 fg:#C9920A)\
$c\
$elixir\
$elm\
$golang\
$haskell\
$java\
$julia\
$nodejs\
$nim\
$python\
$rust\
$docker_context\
[](bg:#7A5500 fg:#9B6E00)\
$cmd_duration\
[](bg:#1a1400 fg:#7A5500)\
$jobs\
$sudo\
$status\
$time\
[](fg:#1a1400)\
$fill\
$memory_usage\
[ ]()\
$line_break\
$character\
"""

add_newline = true
command_timeout = 5000

# ── Left prompt segments ─────────────────────────────────────────────

[os]
disabled = false
style = "bg:#1a1400 fg:#FFD700"

[os.symbols]
Ubuntu = "  "
Arch = "  "
Debian = "  "
Fedora = "  "
Windows = "  "
Macos = "  "
Linux = "  "

[username]
show_always = true
style_user = "bg:#1a1400 fg:#F5ECC8"
style_root = "bg:#1a1400 fg:#f7768e bold"
format = "[ $user]($style)"

[hostname]
ssh_only = true
style = "bg:#1a1400 fg:#FFE566 bold"
format = "[@$hostname ]($style)"

[directory]
style = "bg:#FFC726 fg:#1a1400 bold"
format = "[ $path$read_only ]($style)"
truncation_length = 4
truncation_symbol = ".../"
read_only = " 󰌾"
fish_style_pwd_dir_length = 1

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰎆 "
"Pictures" = "󰋩 "
"Videos" = "󰕧 "
"Nextcloud" = "󰅟 "
"Scripts" = " "
".config" = " "
".local" = "󰆼 "
"Code" = " "

[git_branch]
symbol = ""
style = "bg:#C9920A fg:#1a1400"
format = "[ $symbol $branch ]($style)"
truncation_length = 24
truncation_symbol = "..."

[git_status]
style = "bg:#C9920A fg:#1a1400"
format = "[$all_status$ahead_behind]($style)"
conflicted = "[  ${count}](bg:#C9920A fg:#f7768e bold) "
ahead = "[󰜸 ${count}](bg:#C9920A fg:#1a1400) "
behind = "[󰜯 ${count}](bg:#C9920A fg:#1a1400) "
diverged = "[󰹺 ](bg:#C9920A fg:#f7768e bold) "
untracked = "[? ${count}](bg:#C9920A fg:#FFE566) "
stashed = "[󰏗 ${count}](bg:#C9920A fg:#F5ECC8) "
modified = "[~ ${count}](bg:#C9920A fg:#FFB347) "
staged = "[ ${count}](bg:#C9920A fg:#9ece6a bold) "
renamed = "[» ${count}](bg:#C9920A fg:#F5ECC8) "
deleted = "[ ${count}](bg:#C9920A fg:#f7768e) "
up_to_date = "[](bg:#C9920A fg:#9ece6a) "

[git_metrics]
disabled = false
added_style = "bg:#C9920A fg:#9ece6a bold"
deleted_style = "bg:#C9920A fg:#f7768e bold"
format = "([+$added]($added_style) )([-$deleted]($deleted_style) )"
only_nonzero_diffs = true

# ── Language segments (deep gold band) ───────────────────────────────

[c]
symbol = " "
style = "bg:#9B6E00 fg:#F5ECC8"
format = "[ $symbol$version ]($style)"

[elixir]
symbol = " "
style = "bg:#9B6E00 fg:#F5ECC8"
format = "[ $symbol$version ]($style)"

[elm]
symbol = " "
style = "bg:#9B6E00 fg:#F5ECC8"
format = "[ $symbol$version ]($style)"

[golang]
symbol = " "
style = "bg:#9B6E00 fg:#F5ECC8"
format = "[ $symbol$version ]($style)"

[haskell]
symbol = " "
style = "bg:#9B6E00 fg:#F5ECC8"
format = "[ $symbol$version ]($style)"

[java]
symbol = " "
style = "bg:#9B6E00 fg:#F5ECC8"
format = "[ $symbol$version ]($style)"

[julia]
symbol = " "
style = "bg:#9B6E00 fg:#F5ECC8"
format = "[ $symbol$version ]($style)"

[nodejs]
symbol = " "
style = "bg:#9B6E00 fg:#F5ECC8"
format = "[ $symbol$version ]($style)"

[nim]
symbol = "󰆥 "
style = "bg:#9B6E00 fg:#F5ECC8"
format = "[ $symbol$version ]($style)"

[python]
symbol = " "
style = "bg:#9B6E00 fg:#F5ECC8"
format = "[ $symbol$version( $virtualenv)]($style)"

[rust]
symbol = "󱘗 "
style = "bg:#9B6E00 fg:#F5ECC8"
format = "[ $symbol$version ]($style)"

[docker_context]
symbol = " "
style = "bg:#9B6E00 fg:#F5ECC8"
format = "[ $symbol$context ]($style)"

# ── Info segments (right side of line 1) ─────────────────────────────

[cmd_duration]
min_time = 1000
style = "bg:#7A5500 fg:#F5ECC8 bold"
format = "[ 󰔟 $duration ]($style)"
show_milliseconds = false
min_time_to_notify = 30000

[jobs]
style = "bg:#1a1400 fg:#FFD700 bold"
format = "[ 󰜎 $number ]($style)"
number_threshold = 1
symbol_threshold = 1

[sudo]
disabled = false
style = "bg:#1a1400 fg:#f7768e bold"
format = "[ 󰞀 ]($style)"
symbol = ""

[status]
disabled = false
style = "bg:#1a1400 fg:#f7768e"
format = "[ 󰅗 $status ]($style)"
success_symbol = ""
not_found_symbol = "? "
sigint_symbol = "INT "
signal_symbol = "SIG "
map_symbol = true
recognize_signal_code = true

[time]
disabled = false
time_format = "%H:%M"
style = "bg:#1a1400 fg:#F5ECC8"
format = "[  $time ]($style)"

[fill]
symbol = " "

[memory_usage]
disabled = false
threshold = 60
style = "fg:#FFD700"
format = "[󰍛 ${ram_pct}%]($style)"

# ── Line 2: prompt character ─────────────────────────────────────────

[character]
success_symbol = "[❯](bold fg:#FFC726)"
error_symbol = "[❯](bold fg:#f7768e)"
vimcmd_symbol = "[❮](bold fg:#C9920A)"
vimcmd_replace_one_symbol = "[❮](bold fg:#FFB347)"
vimcmd_replace_symbol = "[❮](bold fg:#FFB347)"
vimcmd_visual_symbol = "[❮](bold fg:#FFD700)"
